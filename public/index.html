<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo + Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-text">
        <h1>Todo & Calculator</h1>
        <p>Track tasks, run quick math, and enjoy a beautiful math-inspired interface.</p>
      </div>
      <div class="hero-symbols">
        <span>+</span>
        <span>−</span>
        <span>×</span>
        <span>÷</span>
        <span>=</span>
      </div>
    </header>

    <main class="grid-layout">
      <section class="card todo-card">
        <h2>My Todo List</h2>
        <div class="todo-input-row">
          <input id="todo-input" type="text" placeholder="Add a new task..." />
          <button id="add-todo">Add</button>
        </div>
        <ul id="todo-list"></ul>
      </section>

      <section class="card calc-card">
        <h2>Quick Calculator</h2>
        <div class="calc-display" id="calc-display">0</div>
        <div class="calc-grid">
          <button class="calc-btn" data-value="7">7</button>
          <button class="calc-btn" data-value="8">8</button>
          <button class="calc-btn" data-value="9">9</button>
          <button class="calc-btn operator" data-value="/">÷</button>
          <button class="calc-btn" data-value="4">4</button>
          <button class="calc-btn" data-value="5">5</button>
          <button class="calc-btn" data-value="6">6</button>
          <button class="calc-btn operator" data-value="*">×</button>
          <button class="calc-btn" data-value="1">1</button>
          <button class="calc-btn" data-value="2">2</button>
          <button class="calc-btn" data-value="3">3</button>
          <button class="calc-btn operator" data-value="-">−</button>
          <button class="calc-btn" data-value="0">0</button>
          <button class="calc-btn" data-value=".">.</button>
          <button class="calc-btn equals" data-value="=">=</button>
          <button class="calc-btn operator" data-value="+">+</button>
        </div>
        <div class="calc-actions">
          <button id="clear-calc">Clear</button>
          <button id="delete-calc">Delete</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
